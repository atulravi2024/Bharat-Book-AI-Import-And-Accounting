
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Apply theme immediately before React renders
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script>
    if (typeof global === 'undefined') {
      window.global = new Proxy(window, {
        set: function(target, prop, value) {
          if (prop === 'fetch') return true;
          try { target[prop] = value; } catch(e) {}
          return true;
        }
      });
    }
    try {
      const origFetch = window.fetch;
      Object.defineProperty(window, 'fetch', {
        get: () => origFetch,
        set: (val) => {
          // silently ignore assignments to window.fetch
        },
        configurable: true,
        enumerable: true
      });
    } catch(e) {}

    // Suppress benign WebSocket errors from Vite in this environment
    window.addEventListener('unhandledrejection', function(event) {
      if (event.reason && (
        event.reason.message === 'WebSocket closed without opened' || 
        event.reason === 'WebSocket closed without opened' ||
        (typeof event.reason === 'string' && event.reason.includes('WebSocket'))
      )) {
        event.preventDefault();
      }
    });
  </script>
  <title>Bharat Book - AI Import</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" crossorigin="anonymous" />
</head>
<body class="bg-gray-100 dark:bg-gray-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
